<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الفيزياء الإماراتي</title>
    <style>
        :root {
            --uae-red: #FF0000;
            --uae-green: #007A33;
            --uae-black: #000000;
            --gold-glow: #FFD700;
            --physics-blue: #00d4ff;
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('./gg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            color: white;
        }

        /* خلفية فيزيائية خفيفة */
        body::before {
            content: "E=mc²   F=ma   λ=h/p";
            position: absolute;
            top: 10%;
            left: 5%;
            font-size: 5rem;
            opacity: 0.03;
            font-weight: bold;
            pointer-events: none;
        }

        .card {
            background: rgba(13, 17, 23, 0.95);
            padding: 40px;
            border-radius: 20px;
            border-top: 5px solid var(--uae-red);
            border-right: 5px solid var(--uae-green);
            border-bottom: 5px solid white;
            border-left: 5px solid var(--uae-black);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
            width: 380px;
            text-align: center;
            position: relative;
        }

        .card h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 50%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .atom-icon {
            font-size: 3rem;
            color: var(--physics-blue);
            margin-bottom: 15px;
            display: inline-block;
            animation: spin 5s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1c2128;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--uae-green);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 122, 51, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--uae-green), #00a344);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 122, 51, 0.5);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="atom-icon">⚛️</div>
        <h1>مسبار المعرفة الفيزيائية</h1>
        <p style="color: var(--uae-green); font-weight: bold;">طموح زايد يعانق العلم</p>
        
        <!-- استبدل ID_YOUR_FORM بـ ID الخاص بك من Formspree -->
        <form action="https://formspree.io/f/xzdogjor" method="POST">
            <input type="email" name="email" placeholder="البريد الإلكتروني" required>
            <textarea name="message" placeholder="اكتب رسالة لحماة الوطن البواسل" rows="4" required></textarea>
            <button type="submit">
                <span>إرسال البيانات</span>
                <span>🚀</span>
            </button>
        </form>
    </div>

</body>
</html>
