<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسبار الفيزياء الإماراتي</title>
    <style>
        :root {
            --uae-red: #FF0000;
            --uae-green: #007A33;
            --physics-blue: #00d4ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* شاشة البداية (زر الدخول) */
        #entry-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: 1s;
        }

        #start-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            background: none;
            color: var(--uae-green);
            border: 2px solid var(--uae-green);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 122, 51, 0.4);
            transition: 0.5s;
        }

        #start-btn:hover {
            background: var(--uae-green);
            color: white;
            box-shadow: 0 0 40px var(--uae-green);
        }

        /* حاوية الفيديو */
        #intro-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            display: none;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* المحتوى الرئيسي للموقع */
        #main-site {
            display: none;
            height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('gg.png');
            background-size: cover;
            background-position: center;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 2s;
        }

        .card {
            background: rgba(13, 17, 23, 0.85);
            padding: 40px;
            border-radius: 20px;
            border-top: 5px solid var(--uae-red);
            border-bottom: 5px solid white;
            border-right: 5px solid var(--uae-green);
            border-left: 5px solid #333;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .atom-icon { font-size: 3.5rem; animation: spin 4s linear infinite; margin-bottom: 10px; display: block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { color: white; margin: 10px 0; font-size: 1.8rem; }
        .sub-text { color: var(--uae-green); font-weight: bold; margin-bottom: 20px; }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid #444;
            border-radius: 8px; color: white; box-sizing: border-box;
        }

        button.send-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(45deg, var(--uae-green), #00a344);
            border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        button.send-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--uae-green); }
    </style>
</head>
<body>

    <!-- 1. شاشة البداية لتفعيل الصوت -->
    <div id="entry-screen">
        <div style="color: white; margin-bottom: 20px; font-size: 1.2rem;">نظام مسبار المعرفة الفيزيائي</div>
        <button id="start-btn" onclick="startExperience()">تشغيل الأنظمة 🚀</button>
    </div>

    <!-- 2. فيديو المقدمة -->
    <div id="intro-container">
        <video id="myVideo">
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 3. الموقع الرئيسي -->
    <div id="main-site">
        <div class="card">
            <span class="atom-icon">⚛️</span>
            <h1>مسبار المعرفة</h1>
            <p class="sub-text">طموح زايد يعانق العلم</p>
            
            <form action="https://formspree.io/f/ID_YOUR_FORM" method="POST">
                <input type="email" name="email" placeholder="بريدك الإلكتروني" required>
                <textarea name="message" placeholder="رسالتك لعلماء المستقبل..." rows="4" required></textarea>
                <button type="submit" class="send-btn">إرسال البيانات</button>
            </form>
            <p style="font-size: 0.7rem; color: #888; margin-top: 15px;">صُنع بفخر في الإمارات العربية المتحدة 🇦🇪</p>
        </div>
    </div>

    <script>
        const entryScreen = document.getElementById('entry-screen');
        const introContainer = document.getElementById('intro-container');
        const video = document.getElementById('myVideo');
        const mainSite = document.getElementById('main-site');

        function startExperience() {
            // إخفاء شاشة الدخول وإظهار الفيديو
            entryScreen.style.opacity = '0';
            setTimeout(() => {
                entryScreen.style.display = 'none';
                introContainer.style.display = 'flex';
                video.play(); // سيعمل الصوت هنا لأن المستخدم ضغط على الزر
            }, 1000);
        }

        // عند انتهاء الفيديو
        video.onended = function() {
            introContainer.style.opacity = '0';
            setTimeout(() => {
                introContainer.style.display = 'none';
                mainSite.style.display = 'flex';
                setTimeout(() => { mainSite.style.opacity = '1'; }, 100);
            }, 1000);
        };
    </script>
</body>
</html>
